<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muscle Group Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; font-family: ui-sans-serif, system-ui, sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
        .muscle-btn.active { background-color: #3b82f6; border-color: #60a5fa; color: white; }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
    </style>
</head>
<body class="text-slate-200 p-4 pb-12">

    <div class="max-w-md mx-auto space-y-6">
        <!-- Header -->
        <header class="pt-4">
            <h1 class="text-3xl font-black text-white tracking-tight italic uppercase">Priority</h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1" id="current-date-display"></p>
        </header>

        <!-- Dynamic Recommendation -->
        <div id="recommendation-card" class="card rounded-3xl p-8 shadow-2xl border-l-8 border-blue-500 flex flex-col items-center text-center space-y-4">
            <span class="text-blue-400 text-xs font-black uppercase tracking-widest">Recommended Focus</span>
            <h2 id="next-muscle-group" class="text-3xl font-bold text-white leading-tight">Loading...</h2>
            <p id="days-since-last" class="text-slate-400 text-sm italic"></p>
        </div>

        <!-- Multi-Select Action Section -->
        <div class="space-y-4">
            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest px-1">Log Today's Work</h3>
            <div class="grid grid-cols-2 gap-3" id="muscle-selector">
                <!-- Muscle buttons generated by JS -->
            </div>
            <button onclick="submitWorkout()" id="log-btn" class="w-full bg-slate-800 border border-slate-700 p-5 rounded-2xl font-black text-lg text-slate-500 transition-all uppercase tracking-widest cursor-not-allowed" disabled>
                Select Muscles
            </button>
        </div>

        <!-- History List -->
        <div class="space-y-4">
            <div class="flex justify-between items-end px-1">
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest">Recent Logs</h3>
                <button onclick="clearLogs()" class="text-[10px] text-red-500 font-bold uppercase hover:underline">Clear All</button>
            </div>
            <div id="history-container" class="space-y-2">
                <!-- History items -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-2xl opacity-0 transition-all duration-300 pointer-events-none z-50 text-center min-w-[200px]">
        Log Saved
    </div>

    <script>
        const MUSCLES = ["Chest", "Back", "Legs", "Shoulders", "Biceps", "Triceps"];
        let selectedMuscles = new Set();
        let history = JSON.parse(localStorage.getItem('workout_history')) || [];
        let editingId = null;

        function init() {
            const selector = document.getElementById('muscle-selector');
            selector.innerHTML = MUSCLES.map(m => `
                <button onclick="toggleMuscle('${m}')" id="btn-${m}" class="muscle-btn card p-4 rounded-xl font-bold text-slate-400 border border-slate-700 transition-all">
                    ${m}
                </button>
            `).join('');
            updateUI();
        }

        function toggleMuscle(muscle) {
            const btn = document.getElementById(`btn-${muscle}`);
            if (selectedMuscles.has(muscle)) {
                selectedMuscles.delete(muscle);
                btn.classList.remove('active');
            } else {
                selectedMuscles.add(muscle);
                btn.classList.add('active');
            }
            
            const logBtn = document.getElementById('log-btn');
            if (selectedMuscles.size > 0) {
                logBtn.disabled = false;
                logBtn.classList.replace('bg-slate-800', 'bg-blue-600');
                logBtn.classList.replace('text-slate-500', 'text-white');
                logBtn.classList.remove('cursor-not-allowed');
                logBtn.innerText = `Log ${Array.from(selectedMuscles).length} Groups`;
            } else {
                logBtn.disabled = true;
                logBtn.classList.replace('bg-blue-600', 'bg-slate-800');
                logBtn.classList.replace('text-white', 'text-slate-500');
                logBtn.classList.add('cursor-not-allowed');
                logBtn.innerText = "Select Muscles";
            }
        }

        function submitWorkout() {
            if (selectedMuscles.size === 0) return;
            
            const entry = {
                groups: Array.from(selectedMuscles),
                timestamp: new Date().getTime(),
                id: Math.random().toString(36).substr(2, 9)
            };
            
            history.unshift(entry);
            sortAndSave();
            
            showToast(`Logged: ${entry.groups.join(' & ')}`);
            
            selectedMuscles.clear();
            document.querySelectorAll('.muscle-btn').forEach(b => b.classList.remove('active'));
            updateUI();
        }

        function deleteLog(id) {
            history = history.filter(item => item.id !== id);
            sortAndSave();
            updateUI();
            showToast("Entry Deleted");
        }

        function startEdit(id) {
            editingId = id;
            renderHistory();
        }

        function cancelEdit() {
            editingId = null;
            renderHistory();
        }

        function saveEdit(id) {
            const dateInput = document.getElementById(`edit-date-${id}`);
            if (!dateInput.value) return cancelEdit();

            const newDate = new Date(dateInput.value);
            // Preserving current time to avoid weird "0 days since" logic if edited to today
            const now = new Date();
            newDate.setHours(now.getHours(), now.getMinutes(), now.getSeconds());

            const index = history.findIndex(item => item.id === id);
            if (index !== -1) {
                history[index].timestamp = newDate.getTime();
                sortAndSave();
                showToast("Date Updated");
            }
            
            editingId = null;
            updateUI();
        }

        function sortAndSave() {
            // Ensure chronological order for proper "Priority" calculation
            history.sort((a, b) => b.timestamp - a.timestamp);
            if (history.length > 20) history.pop();
            localStorage.setItem('workout_history', JSON.stringify(history));
        }

        function calculateNext() {
            const nextEl = document.getElementById('next-muscle-group');
            const daysEl = document.getElementById('days-since-last');
            const cardEl = document.getElementById('recommendation-card');

            const muscleStatus = MUSCLES.map(muscle => {
                const lastLog = history.find(entry => entry.groups.includes(muscle));
                return {
                    name: muscle,
                    lastTimestamp: lastLog ? lastLog.timestamp : 0
                };
            });

            muscleStatus.sort((a, b) => a.lastTimestamp - b.lastTimestamp);

            if (history.length === 0) {
                nextEl.innerText = "Begin Any Group";
                daysEl.innerText = "No history found. Pick a pair and start!";
                return;
            }

            const suggest1 = muscleStatus[0].name;
            const suggest2 = muscleStatus[1].name;
            nextEl.innerText = `${suggest1} & ${suggest2}`;

            const lastWorkoutTime = history[0].timestamp;
            const diffDays = Math.floor((new Date() - lastWorkoutTime) / (1000 * 60 * 60 * 24));

            cardEl.classList.remove('border-green-500', 'border-blue-500', 'border-orange-500');
            if (diffDays <= 0) {
                daysEl.innerText = "Logged today.";
                cardEl.classList.add('border-green-500');
            } else if (diffDays === 1) {
                daysEl.innerText = "Resting since yesterday.";
                cardEl.classList.add('border-blue-500');
            } else {
                daysEl.innerText = `${diffDays} days since last session.`;
                cardEl.classList.add('border-orange-500');
            }
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            container.innerHTML = history.length === 0 
                ? '<p class="text-slate-600 text-sm italic p-4 text-center">No recent history</p>' 
                : history.map(item => {
                    const isEditing = editingId === item.id;
                    const dateObj = new Date(item.timestamp);
                    const displayDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    const inputDate = dateObj.toISOString().split('T')[0];

                    if (isEditing) {
                        return `
                            <div class="card p-4 rounded-xl flex flex-col space-y-3 border-blue-500">
                                <p class="text-white font-bold">${item.groups.join(' & ')}</p>
                                <div class="flex items-center space-x-2">
                                    <input type="date" id="edit-date-${item.id}" value="${inputDate}" 
                                        class="bg-slate-900 border border-slate-700 rounded p-1 text-xs text-white flex-1 focus:outline-none focus:border-blue-500">
                                    <button onclick="saveEdit('${item.id}')" class="bg-blue-600 text-white px-3 py-1 rounded text-xs font-bold">Save</button>
                                    <button onclick="cancelEdit()" class="text-slate-500 text-xs px-2">Cancel</button>
                                </div>
                            </div>
                        `;
                    }

                    return `
                        <div class="card p-4 rounded-xl flex justify-between items-center group">
                            <div>
                                <p class="text-white font-bold">${item.groups.join(' & ')}</p>
                                <p class="text-[10px] text-slate-500 uppercase font-mono">${displayDate}</p>
                            </div>
                            <div class="flex items-center space-x-1">
                                <button onclick="startEdit('${item.id}')" class="text-slate-600 hover:text-blue-400 p-2 transition-colors" title="Edit Date">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                                    </svg>
                                </button>
                                <button onclick="deleteLog('${item.id}')" class="text-slate-600 hover:text-red-500 p-2 transition-colors" title="Delete Entry">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
        }

        function clearLogs() {
            if(confirm("Clear your workout history?")) {
                history = [];
                localStorage.removeItem('workout_history');
                updateUI();
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => toast.classList.replace('opacity-100', 'opacity-0'), 2000);
        }

        function updateUI() {
            renderHistory();
            calculateNext();
            document.getElementById('current-date-display').innerText = new Date().toLocaleDateString('en-US', { 
                weekday: 'long', month: 'long', day: 'numeric' 
            });
        }

        init();
    </script>
</body>
</html>
